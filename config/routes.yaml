index:
    path: /
    controller: App\Controller\DefaultController::index

login:
    path: /login
    controller: App\Controller\UserController::login
    methods: [POST]

register:
    path: /register
    controller: App\Controller\UserController::register
    methods: [POST]

user_id:
    path: /users/{id}
    controller: App\Controller\UserController::getUserById
    methods: [GET, DELETE]

user_recipes:
    path: /users/{id}/recipes
    controller: App\Controller\RecipesController::userRecipes
    methods: [GET, POST]

delete_recipes:
    path: /users/{userId}/recipes/{recipeId}
    controller: App\Controller\RecipesController::deleteUserRecipe
    methods: [DELETE, PUT]

system_recipes:
    path: /recipes
    controller: App\Controller\RecipesController::getSystemRecipes
    methods: [GET]